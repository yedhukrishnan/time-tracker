# XcodeGen spec. Generate the Xcode project with:  xcodegen generate
# (brew install xcodegen first). Then open TimeTracker.xcodeproj.
name: TimeTracker
options:
  bundleIdPrefix: com.yedhu
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"          # Swift 5 language mode — avoids strict-concurrency churn in a scaffold
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_NAME: TimeTracker
    PRODUCT_BUNDLE_IDENTIFIER: com.yedhu.TimeTracker
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: TimeTracker/Info.plist
    CODE_SIGN_ENTITLEMENTS: TimeTracker/TimeTracker.entitlements
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM: ABCDE12345   # <-- set your Apple Developer Team ID (needed for CloudKit)
    ENABLE_HARDENED_RUNTIME: YES
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

targets:
  TimeTracker:
    type: application
    platform: macOS
    sources:
      - path: TimeTracker
        excludes:
          - "Info.plist"
          - "*.entitlements"
