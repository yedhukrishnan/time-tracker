<svg width="18" height="18" viewBox="-4 -4 168 168" xmlns="http://www.w3.org/2000/svg">
  <!-- Monochrome crosshair for the menu bar. Intrinsic 18pt with padding baked
       into the viewBox so it matches neighbouring menu bar icons. Single color
       so it renders as a template image (macOS tints it light/dark). -->
  <g fill="none" stroke="#000000" stroke-linecap="round">
    <circle cx="80" cy="80" r="52" stroke-width="9"/>
    <line x1="80" y1="28" x2="80" y2="44" stroke-width="8"/>
    <line x1="80" y1="116" x2="80" y2="132" stroke-width="8"/>
    <line x1="28" y1="80" x2="44" y2="80" stroke-width="8"/>
    <line x1="116" y1="80" x2="132" y2="80" stroke-width="8"/>
    <circle cx="80" cy="80" r="18" stroke-width="7"/>
  </g>
  <circle cx="80" cy="80" r="6" fill="#000000"/>
</svg>
